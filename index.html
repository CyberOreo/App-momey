<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Money Tracker</title>

  <!-- iOS "Add to Home Screen" app settings -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Money" />
  <meta name="theme-color" content="#0f0f14" />

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- App icon (uses inline SVG as a data URL so no extra files needed for icon fallback) -->
  <link rel="apple-touch-icon" href="icon.png" />

  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f14;
      color: #e8e8f0;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding: calc(var(--safe-top) + 20px) 16px calc(var(--safe-bottom) + 20px);
      overscroll-behavior: none;
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 20px;
      color: #fff;
    }

    /* Summary cards */
    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .card {
      background: #1a1a24;
      border-radius: 16px;
      padding: 14px 12px;
      border: 1px solid #2a2a38;
    }

    .card .label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .card .amount {
      font-size: 18px;
      font-weight: 700;
      word-break: break-all;
    }

    .card.balance .amount { color: #fff; }
    .card.income  .amount { color: #34d399; }
    .card.expense .amount { color: #f87171; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .tab {
      flex: 1;
      padding: 10px 4px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      background: #1a1a24;
      color: #888;
      transition: all 0.15s;
      -webkit-appearance: none;
    }

    .tab.active {
      background: #6366f1;
      color: #fff;
    }

    /* Panels */
    .panel { display: none; }
    .panel.active { display: block; }

    /* Transactions */
    .tx-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tx {
      background: #1a1a24;
      border-radius: 14px;
      padding: 14px 16px;
      border: 1px solid #2a2a38;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .tx-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }

    .tx-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .tx-icon.income  { background: #064e3b33; }
    .tx-icon.expense { background: #7f1d1d33; }

    .tx-desc { font-size: 14px; font-weight: 600; color: #e8e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-date { font-size: 11px; color: #555; margin-top: 3px; }

    .tx-amount { font-size: 15px; font-weight: 700; flex-shrink: 0; }
    .tx-amount.income  { color: #34d399; }
    .tx-amount.expense { color: #f87171; }

    .tx-del {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: 18px;
      padding: 4px 6px;
      flex-shrink: 0;
      line-height: 1;
    }

    .empty {
      text-align: center;
      color: #555;
      padding: 50px 0;
      font-size: 14px;
      line-height: 1.6;
    }

    /* Filter row */
    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .filter-row input, .filter-row select {
      flex: 1;
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 10px;
      padding: 10px 12px;
      color: #e8e8f0;
      font-size: 15px;
      outline: none;
      -webkit-appearance: none;
    }

    .filter-row select { flex: 0 0 auto; }

    /* Forms */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 12px;
      padding: 14px;
      color: #e8e8f0;
      font-size: 16px; /* 16px prevents iOS zoom on focus */
      outline: none;
      width: 100%;
      -webkit-appearance: none;
    }

    .form-group textarea {
      resize: none;
      min-height: 120px;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #6366f1;
    }

    /* Type toggle */
    .type-toggle {
      display: flex;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #2a2a38;
    }

    .type-toggle button {
      flex: 1;
      padding: 13px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      background: #1a1a24;
      color: #555;
      transition: all 0.15s;
      -webkit-appearance: none;
    }

    .type-toggle button.active-income  { background: #064e3b; color: #34d399; }
    .type-toggle button.active-expense { background: #7f1d1d; color: #f87171; }

    /* Buttons */
    .btn {
      padding: 15px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      background: #6366f1;
      color: #fff;
      width: 100%;
      -webkit-appearance: none;
      transition: opacity 0.15s;
    }

    .btn:active { opacity: 0.75; }

    .btn-outline {
      background: transparent;
      border: 1px solid #6366f1;
      color: #6366f1;
    }

    /* SMS parsed results */
    .sms-result {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sms-tx {
      background: #1a1a24;
      border-radius: 12px;
      padding: 12px 14px;
      border: 1px solid #2a2a38;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .sms-tx-info { font-size: 13px; flex: 1; min-width: 0; }
    .sms-tx-info .desc { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sms-tx-info .meta { color: #666; font-size: 11px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .badge.income  { background: #064e3b33; color: #34d399; }
    .badge.expense { background: #7f1d1d33; color: #f87171; }

    .sms-tx-amount { font-weight: 700; font-size: 14px; flex-shrink: 0; }
    .sms-tx-amount.income  { color: #34d399; }
    .sms-tx-amount.expense { color: #f87171; }

    .import-actions { display: flex; gap: 8px; }

    .section-label {
      font-size: 11px;
      color: #666;
      margin-bottom: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .hint { font-size: 12px; color: #555; line-height: 1.5; }

    .divider { height: 1px; background: #2a2a38; margin: 18px 0; }

    .error-msg { color: #f87171; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>&#128176; Money Tracker</h1>

  <!-- Summary -->
  <div class="summary">
    <div class="card balance">
      <div class="label">Balance</div>
      <div class="amount" id="balanceAmt">$0.00</div>
    </div>
    <div class="card income">
      <div class="label">Income</div>
      <div class="amount" id="incomeAmt">$0.00</div>
    </div>
    <div class="card expense">
      <div class="label">Expenses</div>
      <div class="amount" id="expenseAmt">$0.00</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('transactions')">History</button>
    <button class="tab" onclick="switchTab('add')">+ Add</button>
    <button class="tab" onclick="switchTab('sms')">SMS Import</button>
  </div>

  <!-- Transactions -->
  <div class="panel active" id="panel-transactions">
    <div class="filter-row">
      <input type="search" id="searchInput" placeholder="Search..." oninput="renderList()" autocomplete="off" />
      <select id="filterType" onchange="renderList()">
        <option value="all">All</option>
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
    </div>
    <div class="tx-list" id="txList"></div>
  </div>

  <!-- Add -->
  <div class="panel" id="panel-add">
    <div class="form-group">
      <div class="type-toggle">
        <button id="btnExpense" class="active-expense" onclick="setType('expense')">&#128308; Expense</button>
        <button id="btnIncome" onclick="setType('income')">&#128994; Income</button>
      </div>
      <input type="number" id="addAmount" placeholder="Amount (e.g. 50.00)" inputmode="decimal" min="0" step="0.01" />
      <input type="text" id="addDesc" placeholder="Description (e.g. Groceries)" autocomplete="off" />
      <input type="date" id="addDate" />
      <button class="btn" onclick="addTransaction()">Save Transaction</button>
    </div>
  </div>

  <!-- SMS Import -->
  <div class="panel" id="panel-sms">
    <div class="section-label">Paste Bank SMS Messages</div>
    <div class="form-group">
      <textarea id="smsInput" placeholder="Paste your bank SMS notifications here. One per line or separated by blank lines.

Examples:
Your account debited $45.00 at Walmart on 03/20/2026
Credit of $2,500.00 to your account. Salary
Transaction alert: $12.50 debit at Starbucks"></textarea>
      <p class="hint">Works with most bank SMS formats — detects amounts, dates, and merchant names automatically.</p>
      <div class="import-actions">
        <button class="btn" onclick="parseSMS()">Parse Messages</button>
      </div>
    </div>
    <div id="smsResult"></div>
  </div>

  <script>
    // ── Data ─────────────────────────────────────────────────────────────────
    let transactions = JSON.parse(localStorage.getItem('money_txs') || '[]');
    let addType = 'expense';

    function save() {
      localStorage.setItem('money_txs', JSON.stringify(transactions));
    }

    // ── Formatting ────────────────────────────────────────────────────────────
    function fmt(n) {
      return '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtDate(iso) {
      if (!iso) return '';
      const d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Summary ───────────────────────────────────────────────────────────────
    function updateSummary() {
      let income = 0, expense = 0;
      for (const t of transactions) {
        if (t.type === 'income') income += t.amount;
        else expense += t.amount;
      }
      document.getElementById('incomeAmt').textContent  = fmt(income);
      document.getElementById('expenseAmt').textContent = fmt(expense);
      document.getElementById('balanceAmt').textContent = fmt(income - expense);
    }

    // ── Transaction list ──────────────────────────────────────────────────────
    function renderList() {
      const q     = document.getElementById('searchInput').value.toLowerCase();
      const fType = document.getElementById('filterType').value;
      const list  = document.getElementById('txList');

      let filtered = transactions.filter(t => {
        return (fType === 'all' || t.type === fType) &&
               (!q || t.desc.toLowerCase().includes(q));
      }).slice().sort((a, b) => {
        if (a.date > b.date) return -1;
        if (a.date < b.date) return 1;
        return b.id - a.id;
      });

      if (!filtered.length) {
        list.innerHTML = '<div class="empty">No transactions yet.<br>Tap <b>+ Add</b> or use <b>SMS Import</b>.</div>';
        return;
      }

      list.innerHTML = filtered.map(t => `
        <div class="tx">
          <div class="tx-left">
            <div class="tx-icon ${t.type}">${t.type === 'income' ? '&#128994;' : '&#128308;'}</div>
            <div>
              <div class="tx-desc">${esc(t.desc)}</div>
              <div class="tx-date">${fmtDate(t.date)}</div>
            </div>
          </div>
          <span class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</span>
          <button class="tx-del" onclick="deleteTx(${t.id})">&#215;</button>
        </div>
      `).join('');
    }

    function deleteTx(id) {
      if (!confirm('Delete this transaction?')) return;
      transactions = transactions.filter(t => t.id !== id);
      save(); updateSummary(); renderList();
    }

    // ── Add form ──────────────────────────────────────────────────────────────
    function setType(type) {
      addType = type;
      document.getElementById('btnIncome').className  = type === 'income'  ? 'active-income'  : '';
      document.getElementById('btnExpense').className = type === 'expense' ? 'active-expense' : '';
    }

    function addTransaction() {
      const amount = parseFloat(document.getElementById('addAmount').value);
      const desc   = document.getElementById('addDesc').value.trim();
      const date   = document.getElementById('addDate').value;
      if (!amount || amount <= 0) { alert('Enter a valid amount.'); return; }
      if (!desc)   { alert('Enter a description.'); return; }
      if (!date)   { alert('Pick a date.'); return; }
      transactions.push({ id: Date.now(), type: addType, amount, desc, date });
      save(); updateSummary(); renderList();
      document.getElementById('addAmount').value = '';
      document.getElementById('addDesc').value   = '';
      switchTab('transactions');
    }

    // ── SMS parser ────────────────────────────────────────────────────────────
    const SMS_PATTERNS = [
      { re: /(?:debited?|debit(?:ed)? of|withdrawn?|paid|spent|charged)\s+(?:USD|INR|NGN|GBP|EUR|KES|ZAR|GHS)?\$?([\d,]+(?:\.\d+)?)/i, type: 'expense' },
      { re: /(?:credited?|credit(?:ed)? of|received?|deposit(?:ed)?)\s+(?:USD|INR|NGN|GBP|EUR|KES|ZAR|GHS)?\$?([\d,]+(?:\.\d+)?)/i, type: 'income' },
      { re: /(?:USD|INR|NGN|GBP|EUR|KES|ZAR|GHS)?\$?([\d,]+(?:\.\d+)?)\s+(?:debit|withdrawal|charge)/i, type: 'expense' },
      { re: /(?:USD|INR|NGN|GBP|EUR|KES|ZAR|GHS)?\$?([\d,]+(?:\.\d+)?)\s+(?:credit|deposit|received)/i, type: 'income' },
      { re: /transaction\s+(?:alert\s*:?\s*)?(?:USD|INR|NGN|GBP|EUR|KES|ZAR|GHS)?\$?([\d,]+(?:\.\d+)?)\s+(?:debit|dr)/i, type: 'expense' },
      { re: /transaction\s+(?:alert\s*:?\s*)?(?:USD|INR|NGN|GBP|EUR|KES|ZAR|GHS)?\$?([\d,]+(?:\.\d+)?)\s+(?:credit|cr)/i, type: 'income' },
      { re: /(?:USD|INR|NGN|GBP|EUR|KES|ZAR|GHS|Rs\.?)?\s*([\d,]+(?:\.\d+)?)\s+DR\b/i, type: 'expense' },
      { re: /(?:USD|INR|NGN|GBP|EUR|KES|ZAR|GHS|Rs\.?)?\s*([\d,]+(?:\.\d+)?)\s+CR\b/i, type: 'income' },
    ];

    const DATE_RES = [
      /\b(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})\b/,
      /\b(\d{4}[\/\-]\d{2}[\/\-]\d{2})\b/,
      /\b(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{1,2},?\s+\d{4}/i,
      /\b\d{1,2}\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{4}/i,
    ];

    function parseDate(text) {
      for (const p of DATE_RES) {
        const m = text.match(p);
        if (m) { const d = new Date(m[0]); if (!isNaN(d)) return d.toISOString().slice(0,10); }
      }
      return new Date().toISOString().slice(0,10);
    }

    function extractDesc(text) {
      let m = text.match(/\bat\s+([A-Za-z0-9\s&'.\-]{2,30}?)(?:\s+on\b|\s+\d|\.|,|$)/i);
      if (m) return m[1].trim();
      m = text.match(/\bfrom\s+([A-Za-z0-9\s&'.\-]{2,30}?)(?:\s+on\b|\s+\d|\.|,|$)/i);
      if (m) return m[1].trim();
      m = text.match(/\bto\s+([A-Za-z0-9\s&'.\-]{2,30}?)(?:\s+on\b|\s+\d|\.|,|$)/i);
      if (m) return m[1].trim();
      return text.replace(/\s+/g,' ').slice(0,45);
    }

    function parseSingleSMS(text) {
      text = text.trim();
      if (!text) return null;
      for (const pat of SMS_PATTERNS) {
        const m = text.match(pat.re);
        if (m) {
          const amount = parseFloat(m[1].replace(/,/g,''));
          if (!amount || amount <= 0) continue;
          return { type: pat.type, amount, desc: extractDesc(text), date: parseDate(text), raw: text };
        }
      }
      return null;
    }

    function parseSMS() {
      const raw = document.getElementById('smsInput').value;
      if (!raw.trim()) { alert('Paste some SMS messages first.'); return; }
      let blocks = raw.split(/\n{2,}/);
      if (blocks.length === 1) blocks = raw.split('\n');
      const results = blocks.map(parseSingleSMS).filter(Boolean);
      const el = document.getElementById('smsResult');
      if (!results.length) {
        el.innerHTML = '<p class="error-msg">Could not detect transactions. Make sure messages contain amounts and words like debit / credit / charged / received.</p>';
        return;
      }
      // Store results for import
      window._smsResults = results;
      el.innerHTML = `
        <div class="divider"></div>
        <div class="section-label">Found ${results.length} transaction${results.length > 1 ? 's' : ''}</div>
        <div class="sms-result" style="margin-bottom:14px;">
          ${results.map(t => `
            <div class="sms-tx">
              <div class="sms-tx-info">
                <div class="desc">${esc(t.desc)}</div>
                <div class="meta">${fmtDate(t.date)}</div>
              </div>
              <span class="badge ${t.type}">${t.type}</span>
              <span class="sms-tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</span>
            </div>
          `).join('')}
        </div>
        <div class="import-actions">
          <button class="btn" onclick="importAll()">Import All</button>
          <button class="btn btn-outline" onclick="clearSMS()">Clear</button>
        </div>
      `;
    }

    function importAll() {
      for (const t of window._smsResults || []) {
        transactions.push({ id: Date.now() + Math.random(), type: t.type, amount: t.amount, desc: t.desc, date: t.date });
      }
      save(); updateSummary(); renderList();
      clearSMS();
      switchTab('transactions');
    }

    function clearSMS() {
      document.getElementById('smsResult').innerHTML = '';
      document.getElementById('smsInput').value = '';
      window._smsResults = [];
    }

    // ── Tabs ──────────────────────────────────────────────────────────────────
    function switchTab(name) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('panel-' + name).classList.add('active');
      const idx = { transactions: 0, add: 1, sms: 2 };
      document.querySelectorAll('.tab')[idx[name]].classList.add('active');
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    document.getElementById('addDate').value = new Date().toISOString().slice(0,10);
    updateSummary();
    renderList();

    // Register service worker for offline use
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
